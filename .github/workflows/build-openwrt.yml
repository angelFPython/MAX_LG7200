name: Build Custom OpenWrt & Merge Full Flash Dump

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  build_and_merge:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialize Environment Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano p7zip p7zip-full patch pkgconf python3 python3-pip qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip xmlto xz-utils zlib1g-dev libz-dev time xxd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clone OpenWrt Source Code
      run: |
        git clone https://github.com/openwrt/openwrt.git openwrt
        cd openwrt
        git checkout openwrt-23.05

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Inject Custom Board Map & Settings
      run: |
        # 1. نسخ ملف الـ DTS إلى مساره القياسي لتعريف جهاز Davolink
        mkdir -p openwrt/target/linux/ipq40xx/files/arch/arm/boot/dts/
        if [ -f "qcom-ipq4019-gapd7200.dts" ]; then
          cp qcom-ipq4019-gapd7200.dts openwrt/target/linux/ipq40xx/files/arch/arm/boot/dts/
        fi
        
        # 2. دمج مجلد files المخصص بالكامل تلقائياً (الشبكة والـ DHCP)
        if [ -d "files" ]; then
          mkdir -p openwrt/files
          cp -r files/* openwrt/files/
        fi

        # 3. تعديل الـ Makefile لإدراج جهاز Davolink GAPD-7200 رسمياً
        echo -e '\n\ndefine Device/davolink_gapd-7200\n\t$(call Device/CcNewifiNetgear)\n\tDEVICE_VENDOR := Davolink\n\tDEVICE_MODEL := GAPD-7200\n\tDEVICE_DTS := qcom-ipq4019-gapd7200\n\tKERNEL_SIZE := 4096k\n\tIMAGE_SIZE := 122880k\n\tBLOCKSIZE := 128k\n\tPAGESIZE := 2048\n\tIMAGES := sysupgrade.bin\nendef\nTARGET_DEVICES += davolink_gapd-7200' >> openwrt/target/linux/ipq40xx/image/generic.mk

    - name: Load Config Seed
      run: |
        cat << 'EOF' > openwrt/.config
        CONFIG_TARGET_ipq40xx=y
        CONFIG_TARGET_ipq40xx_generic=y
        CONFIG_TARGET_DEVICE_ipq40xx_generic_DEVICE_davolink_gapd-7200=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl=y
        CONFIG_PACKAGE_kmod-eoip=y
        CONFIG_PACKAGE_lldpd=y
        CONFIG_PACKAGE_luci-app-watchcat=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        EOF
        
        cd openwrt
        make defconfig

    - name: Compile Custom Firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Execute Cloud Merge (دمج الفلاشة الكاملة 32MB)
      run: |
        find openwrt/bin/targets/ipq40xx/generic/ -type f -name "*sysupgrade.bin" -o -name "*.bin" | head -n 1 | xargs -I {} cp {} openwrt_kernel.bin
        
        # إنشاء مساحة الفلاشة الفارغة
        dd if=/dev/zero ibs=1M count=32 | tr "\000" "\377" > FULL_FLASH_DUMP_MUKTAMIL.bin
        
        # حقن الملفات العشرة من القائمة الرئيسية للمستودع في أماكنها الدقيقة
        [ -f "SBL1.bin" ] && dd if=SBL1.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=0 conv=notrunc
        [ -f "MIBIB.bin" ] && dd if=MIBIB.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=256 conv=notrunc
        [ -f "BOOTCONFIG.bin" ] && dd if=BOOTCONFIG.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=512 conv=notrunc
        [ -f "CDT.bin" ] && dd if=CDT.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=768 conv=notrunc
        [ -f "DDRPARAMS.bin" ] && dd if=DDRPARAMS.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=1024 conv=notrunc
        [ -f "QSEE.bin" ] && dd if=QSEE.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=1280 conv=notrunc
        [ -f "RESV.bin" ] && dd if=RESV.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=2304 conv=notrunc
        [ -f "APPSBL.bin" ] && dd if=APPSBL.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=3328 conv=notrunc
        [ -f "APPSBLENV.bin" ] && dd if=APPSBLENV.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=4352 conv=notrunc
        [ -f "ART.bin" ] && dd if=ART.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=4608 conv=notrunc
        
        # حقن كيرنل ونظام تشغيل OpenWrt المطور
        dd if=openwrt_kernel.bin of=FULL_FLASH_DUMP_MUKTAMIL.bin bs=1K seek=5120 conv=notrunc

    - name: Upload Full Flash Dump File
      uses: actions/upload-artifact@v4
      with:
        name: Davolink-GAPD7200-MUKTAMIL-Dump
        path: FULL_FLASH_DUMP_MUKTAMIL.bin

