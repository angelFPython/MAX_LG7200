name: Build OpenWrt Custom for Davolink GAPD-7200

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  TZ: Asia/Riyadh

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip vim wget xmlto xz-utils zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$USER /workdir

    - name: Clone Source Code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ==================== خطوة تسجيل البوردة وحقنها برمجياً في السورس ====================
    - name: Register and Inject Device into OpenWrt Target
      run: |
        cd openwrt
        
        # 1. إنشاء مسار ملف الـ DTS وحقنه
        mkdir -p target/linux/ipq40xx/files/arch/arm/boot/dts/
        if [ -f "$GITHUB_WORKSPACE/configs/qcom-ipq4019-gapd7200.dts" ]; then
          cp "$GITHUB_WORKSPACE/configs/qcom-ipq4019-gapd7200.dts" target/linux/ipq40xx/files/arch/arm/boot/dts/
        elif [ -f "$GITHUB_WORKSPACE/gapd7200.dts" ]; then
          cp "$GITHUB_WORKSPACE/gapd7200.dts" target/linux/ipq40xx/files/arch/arm/boot/dts/qcom-ipq4019-gapd7200.dts
        fi

        # 2. تعديل ملف image/generic.mk لإجبار الكومبايلر على بناء وتوليد ملف يحمل اسم جهازك وثغرة تفليشه
        cat << 'EOF' >> target/linux/ipq40xx/image/generic.mk

        define Device/Davolink_gapd-7200
          DEVICE_VENDOR := Davolink
          DEVICE_MODEL := GAPD-7200
          SOC := qcom-ipq4019
          DEVICE_DTS := qcom-ipq4019-gapd7200
          IMAGE_SIZE := 30464k
          IMAGES := sysupgrade.bin
          IMAGE/sysupgrade.bin := append-kernel | pad-to $$$$(BLOCKSIZE) | append-rootfs | pad-rootfs | append-metadata
        endef
        TARGET_DEVICES += Davolink_gapd-7200
        EOF
        
        echo "Device definition injected successfully!"

    # ==================== خطوة نقل وحقن ملفات الـ ART العشرة ====================
    - name: Inject and Copy Custom Firmware ART Files
      run: |
        cd openwrt
        mkdir -p package/firmware/ipq-wifi/board-to-bin/
        if [ -d "$GITHUB_WORKSPACE/firmware-art" ]; then
          cp -r $GITHUB_WORKSPACE/firmware-art/* package/firmware/ipq-wifi/board-to-bin/
        fi
        echo "ART/Calibration files processed."

    # ==================== خطوة نقل ملفات الإعدادات الثابتة (Network & DHCP) ====================
    - name: Inject Custom Configuration Files
      run: |
        cd openwrt
        if [ -d "$GITHUB_WORKSPACE/files" ]; then
          cp -r $GITHUB_WORKSPACE/files .
        fi

    - name: Generate Custom Configurations (Force Target Device)
      run: |
        cd openwrt
        
        # إجبار البناء على استهداف البوردة المضافة حديثاً بشكل صريح وثابت
        echo "CONFIG_TARGET_ipq40xx=y" > .config
        echo "CONFIG_TARGET_ipq40xx_generic=y" >> .config
        echo "CONFIG_TARGET_ipq40xx_DEVICE_Davolink_gapd-7200=y" >> .config
        
        # إضافة حزم الميزات المطلوبة
        echo "CONFIG_PACKAGE_luci=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-watchcat=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        echo "CONFIG_PACKAGE_lldpd=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-lldpd=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ip_vti=y" >> .config
        echo "CONFIG_PACKAGE_kmod-eoip=y" >> .config
        echo "CONFIG_PACKAGE_ath10k-firmware-qca4019-ct=y" >> .config
        
        make defconfig

    - name: Inject Custom Wireless Script
      run: |
        cd openwrt
        mkdir -p files/etc/uci-defaults
        cat << 'EOF' > files/etc/uci-defaults/99-custom-wireless
        uci set wireless.radio0.disabled='0'
        uci set wireless.radio1.disabled='0'
        uci set wireless.radio0.country='US'
        uci set wireless.radio1.country='US'
        uci set wireless.radio0.txpower='30'
        uci set wireless.radio1.txpower='30'
        uci set wireless.radio1.htmode='VHT80'
        uci commit wireless
        wifi
        EOF
        chmod +x files/etc/uci-defaults/99-custom-wireless

    - name: Download Package Dependencies
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the Firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware Artifacts
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success'
      with:
        name: OpenWrt_Davolink_GAPD7200
        path: openwrt/bin/targets/ipq40xx/generic/*
